syntax = "proto3";

package kairos.v1;

option go_package = "github.com/kairos-project/kairos/proto/kairos/v1;kairospb";

message Empty {}

message ErrorStatus {
  string code = 1;
  string message = 2;
}

message ActivateRequest {
  string device_id = 1;
  string kair_number = 2;
  bytes public_key = 3;
  string admin_code = 4;
}

message ActivateResponse {
  bool activated = 1;
  string activation_state = 2;
  string device_id = 3;
  string kair_number = 4;
  ErrorStatus error = 5;
}

message MessagePacket {
  string id = 1;
  string type = 2;
  string sender_kair = 3;
  string receiver_kair = 4;
  int64 timestamp = 5;
  bytes encrypted_payload = 6;
  repeated string node_route = 7;
  bool has_attachments = 8;
}

message SendResult {
  string id = 1;
  string status = 2;
  int32 retry_count = 3;
  ErrorStatus error = 4;
}

message FileChunk {
  string transfer_id = 1;
  string sender_kair = 2;
  string receiver_kair = 3;
  int32 chunk_index = 4;
  int32 total_chunks = 5;
  bytes encrypted_payload = 6;
  string checksum = 7;
  int64 timestamp = 8;
}

message TransferStatus {
  string transfer_id = 1;
  string status = 2;
  int32 received_chunks = 3;
  ErrorStatus error = 4;
}

message FetchRequest {
  string receiver_kair = 1;
  string device_id = 2;
}

message QueuedItem {
  string id = 1;
  string type = 2;
  bytes encrypted_payload = 3;
  int64 timestamp = 4;
  int32 retry_count = 5;
}

message Contact {
  string knumber = 1;
  string display_name = 2;
  string real_phone = 3;
  string notes = 4;
  string trust_status = 5;
  int64 last_interaction = 6;
  string avatar_ascii = 7;
}

message ContactList {
  repeated Contact contacts = 1;
  ErrorStatus error = 2;
}

message TrustUpdate {
  string kair_number = 1;
  double delta = 2;
  string reason = 3;
}

message MemoryEntry {
  string id = 1;
  string memory_type = 2;
  string target_id = 3;
  string content = 4;
  double importance = 5;
  int64 created_at = 6;
}

message MemoryQuery {
  string key = 1;
}

service KairOSNode {
  rpc ActivateDevice(ActivateRequest) returns (ActivateResponse);
  rpc SendMessage(MessagePacket) returns (SendResult);
  rpc SendFileChunk(stream FileChunk) returns (TransferStatus);
  rpc FetchQueue(FetchRequest) returns (stream QueuedItem);
  rpc GetContacts(Empty) returns (ContactList);
  rpc UpdateTrustScore(TrustUpdate) returns (Empty);
  rpc StoreAIMemory(MemoryEntry) returns (Empty);
  rpc RetrieveAIMemory(MemoryQuery) returns (MemoryEntry);
}
